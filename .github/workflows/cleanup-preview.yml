name: Clean Up Staging Preview Channel
on:
  pull_request:
    types: [closed]
permissions:
  contents: read
jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      # Mirrors action-hosting-deploy's own default channel ID generation (used by
      # test_client.yaml's PR-triggered deploy, which doesn't set an explicit channelId):
      # "pr<PR#>-<branch, truncated to 20 chars>", with unsupported characters replaced by "_".
      - name: Generate the channel ID for the Firebase preview channel
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:0:20}"
          RAW_CHANNEL_ID="pr${{ github.event.pull_request.number }}-${BRANCH_NAME}"
          echo "PREVIEW_CHANNEL_ID=$(echo "$RAW_CHANNEL_ID" | sed -E 's/[^a-zA-Z0-9_.-]/_/g')" >> $GITHUB_ENV

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Write Firebase service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"

      # The channel's URL (including its Firebase-generated hash suffix) is fixed when the
      # channel is first created, so it must be looked up rather than reconstructed here.
      # wavezync/firebase-authorized-domains@v1.0.0 sends the domain input to the Firebase
      # Auth API as-is (no scheme stripping), which rejects a full URL, so strip it here.
      - name: Look up the preview channel URL
        id: lookup_url
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          URL=$(firebase hosting:channel:list --project ${{ secrets.APP_STAGING_PROJECT_ID }} --json \
            | jq -r --arg id "$PREVIEW_CHANNEL_ID" '.result.channels[] | select(.name | endswith("/channels/" + $id)) | .url')
          HOST="${URL#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%%/*}"
          echo "domain=$HOST" >> "$GITHUB_OUTPUT"

      - name: Remove domain from Firebase Auth
        if: steps.lookup_url.outputs.domain != ''
        uses: wavezync/firebase-authorized-domains@v1.0.0
        with:
          service_account_key_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          domain: ${{ steps.lookup_url.outputs.domain }}
          action: remove
